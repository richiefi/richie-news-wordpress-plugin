steps:
  - label: "Tests (PHP 8.0)"
    command:
      - "/app/bin/install-wp-tests.sh wordpress_test root '' host.containers.internal latest true"
      - "cd /app && phpunit"
      - "cd /app-editions && phpunit"
    env:
      PHP_VERSION: "8.0"
    plugins:
      - docker-compose#v5.4.0:
          run: wordpress_phpunit
          config:
            - docker-compose.phpunit.yml

  - wait

  - label: "Tests (PHP 8.4)"
    command:
      - "/app/bin/install-wp-tests.sh wordpress_test root '' host.containers.internal latest true"
      - "cd /app && phpunit"
      - "cd /app-editions && phpunit"
    env:
      PHP_VERSION: "8.4"
    plugins:
      - docker-compose#v5.4.0:
          run: wordpress_phpunit
          config:
            - docker-compose.phpunit.yml
